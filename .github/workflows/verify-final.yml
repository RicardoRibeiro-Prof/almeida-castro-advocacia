name: Verificação final

on:
  push:
    paths:
      - '.github/workflows/verify-final.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SITE_URL: https://ricardoribeiro-prof.github.io/almeida-castro-advocacia
      VITE_BASE_PATH: /almeida-castro-advocacia/
      VITE_IS_DEMO: 'true'
      VITE_ALLOW_INDEXING: 'false'
      VITE_PRODUCTION_DATA_CONFIRMED: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: npm
      - name: Testar projeto
        shell: bash
        run: |
          set +e
          npm ci --no-audit --no-fund > final-test.log 2>&1
          CI_CODE=$?
          if [ "$CI_CODE" -eq 0 ]; then npm run lint:imports >> final-test.log 2>&1; LINT_CODE=$?; else LINT_CODE=99; fi
          if [ "$CI_CODE" -eq 0 ] && [ "$LINT_CODE" -eq 0 ]; then npm run build >> final-test.log 2>&1; BUILD_CODE=$?; else BUILD_CODE=99; fi
          RESULT="SUCESSO"; if [ "$CI_CODE" -ne 0 ] || [ "$LINT_CODE" -ne 0 ] || [ "$BUILD_CODE" -ne 0 ]; then RESULT="FALHA"; fi
          {
            echo "# Verificação automatizada do build"; echo; echo "Resultado: **$RESULT**"; echo
            echo "- Data UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Commit verificado: $GITHUB_SHA"
            echo "- Node: $(node --version)"; echo "- npm: $(npm --version)"
            echo "- npm ci: código $CI_CODE"; echo "- lint:imports: código $LINT_CODE"; echo "- build, pré-renderização e validação: código $BUILD_CODE"; echo
            echo '```text'; tail -n 150 final-test.log; echo '```'
          } > BUILD-VERIFICATION.md
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BUILD-VERIFICATION.md; git commit -m "Registra teste final com validação dos artigos" || true; git push
          if [ "$RESULT" = "FALHA" ]; then exit 1; fi
