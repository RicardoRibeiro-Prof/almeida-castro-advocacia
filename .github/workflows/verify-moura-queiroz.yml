name: Verificar projeto Moura e Queiroz

on:
  push:
    paths:
      - '.github/workflows/verify-moura-queiroz.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_SITE_URL: https://ricardoribeiro-prof.github.io/almeida-castro-advocacia
  VITE_BASE_PATH: /almeida-castro-advocacia/
  VITE_IS_DEMO: 'true'
  VITE_ALLOW_INDEXING: 'false'
  VITE_PRODUCTION_DATA_CONFIRMED: 'false'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm
      - name: Executar build e auditorias
        shell: bash
        run: |
          set +e
          : > moura-build.log
          npm ci >> moura-build.log 2>&1
          CI_CODE=$?
          if [ "$CI_CODE" -eq 0 ]; then npm run lint:imports >> moura-build.log 2>&1; LINT_CODE=$?; else LINT_CODE=99; fi
          if [ "$CI_CODE" -eq 0 ] && [ "$LINT_CODE" -eq 0 ]; then npm run build >> moura-build.log 2>&1; BUILD_CODE=$?; else BUILD_CODE=99; fi

          RESULT='SUCESSO'
          if [ "$CI_CODE" -ne 0 ] || [ "$LINT_CODE" -ne 0 ] || [ "$BUILD_CODE" -ne 0 ]; then RESULT='FALHA'; fi

          PAGES=$(find dist/moura-queiroz-advocacia -type f -name index.html 2>/dev/null | wc -l | tr -d ' ')
          ARTICLES=$(find dist/moura-queiroz-advocacia/artigos -mindepth 2 -type f -name index.html 2>/dev/null | wc -l | tr -d ' ')
          HOME_CANONICAL=$(grep -o '<link rel="canonical" href="[^"]*"' dist/moura-queiroz-advocacia/index.html 2>/dev/null | head -n 1 | sed 's/.*href="//' | sed 's/"$//')

          {
            echo '# Verificação do projeto Moura & Queiroz'
            echo
            echo "Resultado: **$RESULT**"
            echo
            echo "- Data UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Commit verificado: $GITHUB_SHA"
            echo "- npm ci: código $CI_CODE"
            echo "- lint:imports: código $LINT_CODE"
            echo "- build e auditorias: código $BUILD_CODE"
            echo "- páginas index.html: $PAGES"
            echo "- artigos pré-renderizados: $ARTICLES"
            echo "- canonical inicial: $HOME_CANONICAL"
            echo
            echo '```text'
            tail -n 260 moura-build.log
            echo '```'
          } > MOURA-QUEIROZ-VERIFICATION.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MOURA-QUEIROZ-VERIFICATION.md
          git commit -m 'Registra verificação do projeto Moura e Queiroz' || true
          git push

          if [ "$RESULT" = 'FALHA' ]; then exit 1; fi
