name: Verificar site publicado

on:
  push:
    paths:
      - '.github/workflows/verify-deployed-site.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_SITE_URL: https://ricardoribeiro-prof.github.io/almeida-castro-advocacia
  VITE_BASE_PATH: /almeida-castro-advocacia/
  VITE_IS_DEMO: 'true'
  VITE_ALLOW_INDEXING: 'false'
  VITE_PRODUCTION_DATA_CONFIRMED: 'false'

jobs:
  verify-deployed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v6

      - name: Configurar o Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Gerar e auditar a pasta dist
        shell: bash
        run: |
          set -o pipefail
          npm run lint:imports 2>&1 | tee local-build.log
          npm run build 2>&1 | tee -a local-build.log

      - name: Aguardar a publicação mais recente
        run: sleep 60

      - name: Auditar por HTTP e registrar o resultado
        shell: bash
        env:
          AUDIT_SITE_URL: https://ricardoribeiro-prof.github.io/almeida-castro-advocacia
          AUDIT_ATTEMPTS: '25'
          AUDIT_DELAY_MS: '6000'
        run: |
          set +e
          npm run audit:deployed > deployed-audit.log 2>&1
          AUDIT_CODE=$?

          EXPORTED=$(find dist -type f -path '*/index.html' | wc -l | tr -d ' ')
          HOME_CANONICAL=$(grep -o '<link rel="canonical" href="[^"]*"' dist/index.html | head -n 1 | sed 's/.*href="//')
          ABOUT_CANONICAL=$(grep -o '<link rel="canonical" href="[^"]*"' dist/sobre/index.html | head -n 1 | sed 's/.*href="//')
          ROOT_SAMPLE=$(python - <<'PY'
          from pathlib import Path
          import re
          html = Path('dist/index.html').read_text(encoding='utf-8')
          root = re.search(r'<div id="root"[^>]*>[\s\S]{0,900}', html)
          sample = root.group(0) if root else 'Amostra não encontrada.'
          print(re.sub(r'\s+', ' ', sample).strip())
          PY
          )
          ROBOTS=$(cat dist/robots.txt)
          SITEMAP_URLS=$(grep -c '<url>' dist/sitemap.xml || true)

          RESULT='SUCESSO'
          if [ "$AUDIT_CODE" -ne 0 ]; then RESULT='FALHA'; fi

          {
            echo '# Verificação do site publicado'
            echo
            echo "Resultado: **$RESULT**"
            echo
            echo "- Data UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Commit verificado: $GITHUB_SHA"
            echo "- Auditoria HTTP: código $AUDIT_CODE"
            echo "- Arquivos index.html gerados: $EXPORTED"
            echo "- Canonical inicial: $HOME_CANONICAL"
            echo "- Canonical interno: $ABOUT_CANONICAL"
            echo "- URLs no sitemap demonstrativo: $SITEMAP_URLS"
            echo
            echo '## robots.txt'
            echo
            echo '```text'
            printf '%s\n' "$ROBOTS"
            echo '```'
            echo
            echo '## Amostra do HTML pré-renderizado'
            echo
            echo '```html'
            printf '%s\n' "$ROOT_SAMPLE"
            echo '```'
            echo
            echo '## Resultado da auditoria HTTP'
            echo
            echo '```text'
            cat deployed-audit.log
            echo '```'
          } > DEPLOYMENT-VERIFICATION.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add DEPLOYMENT-VERIFICATION.md
          git commit -m 'Registra verificação do site publicado' || true
          git push

          if [ "$AUDIT_CODE" -ne 0 ]; then exit 1; fi
