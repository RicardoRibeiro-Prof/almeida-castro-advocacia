name: Importar fotografias do site

on:
  push:
    paths:
      - '.github/workflows/import-site-images.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Baixar e validar fotografias
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/images/articles

          download_image() {
            local output="$1"
            local url="$2"
            local temporary="${output}.tmp"
            echo "Baixando ${output}"
            curl --location --fail --silent --show-error \
              --retry 4 --retry-delay 2 --connect-timeout 20 --max-time 120 \
              -H 'Accept: image/jpeg,image/*;q=0.8' \
              -H 'User-Agent: AlmeidaCastroSiteBuild/1.0' \
              "$url" --output "$temporary"

            local mime
            mime="$(file --brief --mime-type "$temporary")"
            local size
            size="$(stat --format='%s' "$temporary")"
            if [[ "$mime" != image/* ]]; then
              echo "Tipo inválido em ${output}: ${mime}"
              exit 1
            fi
            if (( size < 25000 )); then
              echo "Arquivo pequeno demais em ${output}: ${size} bytes"
              exit 1
            fi
            mv "$temporary" "$output"
            echo "OK: ${output} (${mime}, ${size} bytes)"
          }

          download_image 'public/images/hero-office.jpg' 'https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1600&h=1100&q=84&fm=jpg'
          download_image 'public/images/about-office.jpg' 'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1500&h=1100&q=84&fm=jpg'
          download_image 'public/images/team-rafael.jpg' 'https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=1000&h=1250&q=86&fm=jpg'
          download_image 'public/images/team-marina.jpg' 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=1000&h=1250&q=86&fm=jpg'
          download_image 'public/images/articles/previdenciario.jpg' 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=1200&h=630&q=82&fm=jpg'
          download_image 'public/images/articles/familia.jpg' 'https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1200&h=630&q=82&fm=jpg'
          download_image 'public/images/articles/trabalhista.jpg' 'https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=1200&h=630&q=82&fm=jpg'
          download_image 'public/images/articles/consumidor.jpg' 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1200&h=630&q=82&fm=jpg'
          download_image 'public/images/articles/civil.jpg' 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&w=1200&h=630&q=82&fm=jpg'
          download_image 'public/images/articles/empresarial.jpg' 'https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1200&h=630&q=82&fm=jpg'
          download_image 'public/images/articles/general.jpg' 'https://images.unsplash.com/photo-1589391886645-d51941baf7fb?auto=format&fit=crop&w=1200&h=630&q=82&fm=jpg'

      - name: Salvar fotografias no repositório
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/images/hero-office.jpg public/images/about-office.jpg \
            public/images/team-rafael.jpg public/images/team-marina.jpg \
            public/images/articles/*.jpg
          if git diff --cached --quiet; then
            echo 'As fotografias já estão atualizadas.'
          else
            git commit -m 'Adiciona fotografias reais e otimizadas ao site'
            git push
          fi
