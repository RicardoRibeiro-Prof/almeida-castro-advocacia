name: Verificar navegador publicado

on:
  push:
    paths:
      - '.github/workflows/verify-browser-runtime.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  browser-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v6

      - name: Configurar o Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm

      - name: Instalar dependências do projeto
        run: npm ci --no-audit --no-fund

      - name: Instalar navegador de auditoria
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Aguardar publicação
        run: sleep 75

      - name: Auditar erros de execução e console
        shell: bash
        run: |
          set +e
          node --input-type=module <<'NODE' > browser-audit.log 2>&1
          import { chromium } from 'playwright'

          const base = 'https://ricardoribeiro-prof.github.io/almeida-castro-advocacia'
          const routes = [
            '/',
            '/sobre/',
            '/areas-de-atuacao/',
            '/areas-de-atuacao/direito-previdenciario/',
            '/equipe/',
            '/artigos/',
            '/contato/',
            '/politica-de-privacidade/',
            '/admin/',
          ]
          const errors = []
          const browser = await chromium.launch({ headless: true })
          const context = await browser.newContext({ viewport: { width: 390, height: 844 } })

          for (const route of routes) {
            const page = await context.newPage()
            const pageErrors = []
            page.on('pageerror', (error) => pageErrors.push(`pageerror: ${error.message}`))
            page.on('console', (message) => {
              if (message.type() === 'error') pageErrors.push(`console.error: ${message.text()}`)
            })
            page.on('requestfailed', (request) => pageErrors.push(`requestfailed: ${request.url()} - ${request.failure()?.errorText || 'falha'}`))

            const response = await page.goto(`${base}${route}`, { waitUntil: 'networkidle', timeout: 60000 })
            await page.waitForTimeout(1200)
            const status = response?.status() || 0
            const h1 = await page.locator('h1').first().textContent().catch(() => '')
            const visibleText = await page.locator('body').innerText().catch(() => '')
            const rootReady = await page.locator('#root').count()

            if (status < 200 || status >= 400) pageErrors.push(`HTTP ${status}`)
            if (!h1?.trim()) pageErrors.push('H1 visível ausente')
            if (visibleText.trim().length < 180) pageErrors.push('conteúdo visível insuficiente')
            if (route !== '/admin/' && !rootReady) pageErrors.push('#root ausente')
            if (route === '/admin/' && !(await page.locator('#loginView').count())) pageErrors.push('estrutura do painel ausente')

            if (pageErrors.length) errors.push(`${route}: ${pageErrors.join(' | ')}`)
            console.log(`${route}: HTTP ${status}, H1=${JSON.stringify(h1?.trim() || '')}, erros=${pageErrors.length}`)
            await page.close()
          }

          await browser.close()
          if (errors.length) {
            console.error(`\nFalhas encontradas (${errors.length}):`)
            errors.forEach((error) => console.error(`- ${error}`))
            process.exit(1)
          }
          console.log('\nAuditoria em navegador concluída sem erros de console, página ou requisições.')
          NODE
          BROWSER_CODE=$?

          RESULT='SUCESSO'
          if [ "$BROWSER_CODE" -ne 0 ]; then RESULT='FALHA'; fi
          {
            echo '# Verificação em navegador real'
            echo
            echo "Resultado: **$RESULT**"
            echo
            echo "- Data UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Commit verificado: $GITHUB_SHA"
            echo "- Auditoria Playwright/Chromium: código $BROWSER_CODE"
            echo
            echo '```text'
            cat browser-audit.log
            echo '```'
          } > BROWSER-VERIFICATION.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add BROWSER-VERIFICATION.md
          git commit -m 'Registra verificação em navegador real' || true
          git push

          if [ "$BROWSER_CODE" -ne 0 ]; then exit 1; fi
