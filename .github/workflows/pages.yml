name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Configurar o GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Construir o site
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/
          VITE_SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: npm run build

      - name: Enviar arquivos para publicação
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
