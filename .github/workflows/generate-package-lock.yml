name: Gerar package-lock

on:
  push:
    paths:
      - '.github/workflows/generate-package-lock.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          registry-url: https://registry.npmjs.org

      - name: Gerar arquivo de dependências
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Salvar package-lock no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "package-lock.json já está atualizado."
          else
            git commit -m "Adiciona package-lock para build reproduzível"
            git push
          fi
