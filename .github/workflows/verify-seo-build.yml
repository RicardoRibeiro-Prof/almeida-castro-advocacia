name: Verificar build SEO

on:
  push:
    paths:
      - '.github/workflows/verify-seo-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SITE_URL: https://ricardoribeiro-prof.github.io/almeida-castro-advocacia
      VITE_BASE_PATH: /almeida-castro-advocacia/
      VITE_IS_DEMO: 'true'
      VITE_ALLOW_INDEXING: 'false'
      VITE_PRODUCTION_DATA_CONFIRMED: 'false'
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: npm

      - name: Executar verificações e registrar resultado
        id: verification
        shell: bash
        run: |
          set +e
          npm ci --no-audit --no-fund > npm-ci.log 2>&1
          CI_CODE=$?

          if [ "$CI_CODE" -eq 0 ]; then
            npm run lint:imports > lint.log 2>&1
            LINT_CODE=$?
          else
            LINT_CODE=99
            echo "Não executado porque npm ci falhou." > lint.log
          fi

          if [ "$CI_CODE" -eq 0 ] && [ "$LINT_CODE" -eq 0 ]; then
            npm run build > build.log 2>&1
            BUILD_CODE=$?
          else
            BUILD_CODE=99
            echo "Não executado porque uma etapa anterior falhou." > build.log
          fi

          ROUTES_CODE=99
          if [ "$BUILD_CODE" -eq 0 ]; then
            test -f dist/index.html \
              && test -f dist/sobre/index.html \
              && test -f dist/areas-de-atuacao/direito-civil/index.html \
              && test -f dist/artigos/index.html \
              && test -f dist/robots.txt \
              && test -f dist/sitemap.xml \
              && grep -q 'data-prerendered="true"' dist/sobre/index.html \
              && grep -q '<link rel="canonical"' dist/sobre/index.html \
              && grep -q 'noindex, nofollow' dist/index.html
            ROUTES_CODE=$?
          fi

          RESULT="SUCESSO"
          if [ "$CI_CODE" -ne 0 ] || [ "$LINT_CODE" -ne 0 ] || [ "$BUILD_CODE" -ne 0 ] || [ "$ROUTES_CODE" -ne 0 ]; then
            RESULT="FALHA"
          fi

          {
            echo "# Verificação automatizada do build"
            echo
            echo "Resultado: **$RESULT**"
            echo
            echo "- Node: $(node --version)"
            echo "- npm: $(npm --version)"
            echo "- npm ci: código $CI_CODE"
            echo "- lint:imports: código $LINT_CODE"
            echo "- build completo: código $BUILD_CODE"
            echo "- rotas e HTMLs essenciais: código $ROUTES_CODE"
            echo
            echo "## Saída do npm ci"
            echo '```text'
            tail -n 60 npm-ci.log
            echo '```'
            echo
            echo "## Saída do lint"
            echo '```text'
            tail -n 80 lint.log
            echo '```'
            echo
            echo "## Saída do build"
            echo '```text'
            tail -n 120 build.log
            echo '```'
          } > BUILD-VERIFICATION.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BUILD-VERIFICATION.md
          git commit -m "Registra verificação automatizada do build" || true
          git push

          if [ "$RESULT" = "FALHA" ]; then exit 1; fi
